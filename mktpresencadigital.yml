services:
  mysql:
    image: mysql:8.0
    container_name: mktpd-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "fabia084_wp486"
      MYSQL_USER: "fabia084_wp486"
      MYSQL_PASSWORD: "Bi4noM4x*"
    ports:
      - "33091:3306"
    volumes:
      - mktpd_mysql_data:/var/lib/mysql

  wordpress:
    image: wordpress:6.8-php8.2-apache
    container_name: mktpd-wordpress
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      WORDPRESS_DB_HOST: "mysql:3306"
      WORDPRESS_DB_NAME: "fabia084_wp486"
      WORDPRESS_DB_USER: "fabia084_wp486"
      WORDPRESS_DB_PASSWORD: "Bi4noM4x*"
      WORDPRESS_TABLE_PREFIX: "wpxf_"
    ports:
      - "8090:80"
    volumes:
      - ./wp-content:/var/www/html/wp-content

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mktpd-phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: "mysql"
      MYSQL_ROOT_PASSWORD: "root"
    ports:
      - "8091:80"

volumes:
  mktpd_mysql_data: